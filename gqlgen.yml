schema:
  - graph/schema/*.graphqls

exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

autobind:
  - github.com/nixmaldonado/skytrack/graph/model

omit_slice_element_pointers: true

models:
  ICAOCode:
    model:
      - github.com/nixmaldonado/skytrack/graph/model.ICAOCode
  IATACode:
    model:
      - github.com/nixmaldonado/skytrack/graph/model.IATACode
  Flight:
    fields:
      airline:
        resolver: true
      departureAirport:
        resolver: true
      arrivalAirport:
        resolver: true
